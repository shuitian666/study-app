name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "."
          target: "/tmp/smart-study-release"
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            set -e
            sudo rm -rf /var/www/smart-study/current
            sudo mkdir -p /var/www/smart-study/current
            sudo cp -a /tmp/smart-study-release/. /var/www/smart-study/current/
            cd /var/www/smart-study/current
            sudo SKIP_GIT_SYNC=1 bash deploy/server-deploy.sh
