<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <rect x="60" y="40" width="700" height="300" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">环己酮 (Cyclohexanone) 红外光谱图</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="760" y2="340" stroke="#6b7280" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y2="340" stroke="#6b7280" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="60" y="365" text-anchor="middle" font-size="10" fill="#4b5563">4000</text>
  <text x="200" y="365" text-anchor="middle" font-size="10" fill="#4b5563">3000</text>
  <text x="340" y="365" text-anchor="middle" font-size="10" fill="#4b5563">2000</text>
  <text x="480" y="365" text-anchor="middle" font-size="10" fill="#4b5563">1715</text>
  <text x="620" y="365" text-anchor="middle" font-size="10" fill="#4b5563">1000</text>
  <text x="760" y="365" text-anchor="middle" font-size="10" fill="#4b5563">400</text>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#374151">波数 (cm⁻¹)</text>

  <!-- Y-axis labels -->
  <text x="45" y="50" text-anchor="end" font-size="10" fill="#4b5563">100%</text>
  <text x="45" y="125" text-anchor="end" font-size="10" fill="#4b5563">75%</text>
  <text x="45" y="200" text-anchor="end" font-size="10" fill="#4b5563">50%</text>
  <text x="45" y="275" text-anchor="end" font-size="10" fill="#4b5563">25%</text>
  <text x="45" y="340" text-anchor="end" font-size="10" fill="#4b5563">0%</text>
  <text x="25" y="190" text-anchor="middle" font-size="12" fill="#374151" transform="rotate(-90 25 190)">透射率</text>

  <!-- Spectrum line -->
  <path d="M 60 80
           L 150 85
           L 200 180
           L 250 170
           L 300 100
           L 350 90
           L 400 280
           L 450 95
           L 500 110
           L 550 150
           L 600 130
           L 650 160
           L 700 140
           L 760 125"
        fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- Peak annotation -->
  <circle cx="400" cy="280" r="5" fill="#ef4444"/>
  <text x="420" y="260" font-size="11" fill="#dc2626">C=O 1715 cm⁻¹</text>

  <!-- C-H region -->
  <rect x="80" y="145" width="180" height="60" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="170" y="220" font-size="10" fill="#059669">C-H 伸缩</text>
</svg>
