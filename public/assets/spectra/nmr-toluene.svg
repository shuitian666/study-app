<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <rect x="60" y="40" width="700" height="300" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">甲苯 (Toluene) ¹H NMR 谱图</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="760" y2="340" stroke="#6b7280" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y2="340" stroke="#6b7280" stroke-width="2"/>

  <!-- X-axis labels (chemical shift) -->
  <text x="60" y="365" text-anchor="middle" font-size="10" fill="#4b5563">8.0</text>
  <text x="160" y="365" text-anchor="middle" font-size="10" fill="#4b5563">7.2</text>
  <text x="350" y="365" text-anchor="middle" font-size="10" fill="#4b5563">4.0</text>
  <text x="550" y="365" text-anchor="middle" font-size="10" fill="#4b5563">2.3</text>
  <text x="760" y="365" text-anchor="middle" font-size="10" fill="#4b5563">0.0</text>
  <text x="400" y="385" text-anchor="middle" font-size="12" fill="#374151">化学位移 δ (ppm)</text>

  <!-- Y-axis labels -->
  <text x="45" y="50" text-anchor="end" font-size="10" fill="#4b5563">强度</text>

  <!-- TMS peak -->
  <line x1="760" y1="320" x2="760" y2="280" stroke="#9ca3af" stroke-width="2"/>
  <text x="760" y="270" text-anchor="middle" font-size="9" fill="#6b7280">TMS</text>

  <!-- Aromatic peaks (7.2 ppm, 5H) -->
  <line x1="160" y1="340" x2="160" y2="100" stroke="#3b82f6" stroke-width="3"/>
  <line x1="150" y1="340" x2="150" y2="130" stroke="#3b82f6" stroke-width="2"/>
  <line x1="170" y1="340" x2="170" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="85" text-anchor="middle" font-size="11" fill="#1e40af">Ar-H (5H)</text>

  <!-- Methyl peak (2.3 ppm, 3H) -->
  <line x1="550" y1="340" x2="550" y2="150" stroke="#10b981" stroke-width="3"/>
  <text x="550" y="135" text-anchor="middle" font-size="11" fill="#059669">CH₃ (3H)</text>

  <!-- Integration lines (示意) -->
  <path d="M 100 340 L 100 110 L 220 110" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="160" y="100" text-anchor="middle" font-size="9" fill="#d97706">5H</text>

  <path d="M 500 340 L 500 160 L 600 160" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="550" y="150" text-anchor="middle" font-size="9" fill="#d97706">3H</text>
</svg>
